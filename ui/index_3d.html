<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESQROBOT 3D</title>
    <!-- สไตล์แยกไฟล์ -->
    <link rel="stylesheet" href="robot3d.css">
</head>
<body>
    <div id="viewport">
        <canvas id="three-canvas"></canvas>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <div class="load-text">กำลังโหลดหุ่นยนต์…</div>
            <div id="load-detail" class="load-detail">รอสักครู่ (ไฟล์โมเดลใหญ่หลายชิ้น)</div>
        </div>

        <div id="status-overlay">
            ROLL <span id="vX">0.0</span>°
            PITCH <span id="vY">0.0</span>°
            YAW <span id="vZ">0.0</span>°
            <span id="wsBadge" class="ws-off">●</span>
        </div>

        <div id="camera-hint">ลาก: หมุนกล้อง · Scroll: ซูม · คลิกขวาลาก: เลื่อน</div>
    </div>

    <!-- importmap ต้องมาก่อน module script ที่ import 'three' -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- ตรรกะแยกไฟล์ -->
    <script type="module" src="robot3d.js"></script>
</body>
</html>
